        inset: auto;
        pointer-events: none;
        z-index: -1;

      .item-page-audio-player.compact {

        border-radius: 18px;
      }

      .item-page-audio-hero {

        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 0.8rem;
        align-items: center;

      .item-page-audio-btn {

        border: 1px solid rgba(255, 255, 255, 0.09);

        opacity: 0.94;
        animation-play-state: running;

        display: grid;
        gap: 0.35rem;

      .item-page-lyrics-line {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 0.5rem 0.6rem;
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);

        white-space: pre-wrap;
        word-break: break-word;
        transition:
          background-color var(--motion-fast) ease,
          border-color var(--motion-fast) ease,
          color var(--motion-fast) ease,
          transform var(--motion-fast) ease,
          opacity var(--motion-fast) ease,
          filter var(--motion-fast) ease,
          text-shadow var(--motion-fast) ease;
      }

      .item-page-lyrics-line.active {
        color: var(--text);
        border-color: rgba(196, 196, 196, 0.46);
        background: rgba(255, 255, 255, 0.14);
        transform: translateX(2px);
      }

      .item-page-lyrics-line.active.is-ending {
        opacity: 0.96;

          0 0 18px rgba(255, 255, 255, 0.2),

      .item-page-lyrics-line.is-final-outro {
        animation: itemPageLyricsFinalFade 860ms cubic-bezier(0.2, 0.74, 0.2, 1) forwards;
        pointer-events: none;

      @keyframes itemPageLyricsFinalFade {
        0% {
          opacity: 1;
          filter: blur(0);
          transform: translateX(2px) translateY(0) scale(1);
          text-shadow:
            0 0 18px rgba(255, 255, 255, 0.22),

          opacity: 0;
          filter: blur(14px);
          transform: translateX(2px) translateY(-18px) scale(0.96);
          text-shadow:
            0 0 10px rgba(255, 255, 255, 0.12),
            0 0 22px rgba(180, 180, 180, 0.05);

      }

      .item-page-lyrics-word {

          filter var(--motion-fast) ease,
          transform var(--motion-fast) ease,
          opacity var(--motion-fast) ease;
      }

      @supports ((-webkit-background-clip: text) or (background-clip: text)) {
        .item-page-lyrics-word {

          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
          color: transparent;

      .item-page-lyrics-tap-sync-current strong {
